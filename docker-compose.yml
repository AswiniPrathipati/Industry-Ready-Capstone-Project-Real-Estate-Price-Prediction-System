version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.backend
    container_name: real-estate-backend
    ports:
      - "8000:8000"
    volumes:
      - model-registry:/app/backend/models/registry
      - app-db:/app/backend/database
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - real-estate-net

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.frontend
    container_name: real-estate-frontend
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://backend:8000
    volumes:
      - app-db:/app/backend/database
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - real-estate-net

  prometheus:
    image: prom/prometheus:latest
    container_name: real-estate-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - backend
    networks:
      - real-estate-net

  grafana:
    image: grafana/grafana:latest
    container_name: real-estate-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - real-estate-net

volumes:
  model-registry:
  app-db:
  grafana-data:

networks:
  real-estate-net:
    driver: bridge
