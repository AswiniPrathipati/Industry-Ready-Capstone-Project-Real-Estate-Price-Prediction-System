apiVersion: apps/v1
kind: Deployment
metadata:
  name: real-estate-backend
  labels:
    app: real-estate-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: real-estate-backend
  template:
    metadata:
      labels:
        app: real-estate-backend
    spec:
      containers:
        - name: backend
          image: real-estate-backend:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: model-registry
              mountPath: /app/backend/models/registry
      volumes:
        - name: model-registry
          persistentVolumeClaim:
            claimName: model-registry-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: real-estate-backend-svc
spec:
  selector:
    app: real-estate-backend
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: real-estate-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: real-estate-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-registry-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
