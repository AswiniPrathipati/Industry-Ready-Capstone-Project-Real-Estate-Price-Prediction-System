apiVersion: v1
kind: Namespace
metadata:
  name: real-estate-ml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: real-estate-frontend
  namespace: real-estate-ml
spec:
  replicas: 2
  selector:
    matchLabels:
      app: real-estate-frontend
  template:
    metadata:
      labels:
        app: real-estate-frontend
    spec:
      containers:
        - name: frontend
          image: real-estate-frontend:latest
          ports:
            - containerPort: 8501
          env:
            - name: API_BASE_URL
              value: "http://real-estate-backend-svc"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: real-estate-frontend-svc
  namespace: real-estate-ml
spec:
  selector:
    app: real-estate-frontend
  ports:
    - port: 80
      targetPort: 8501
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: real-estate-ingress
  namespace: real-estate-ml
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: real-estate-predictor.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: real-estate-backend-svc
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: real-estate-frontend-svc
                port:
                  number: 80
